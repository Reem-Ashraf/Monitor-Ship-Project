name: monitor_ship_project
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:

  provider: ^6.0.1  # أو آخر إصدار موجود

  bloc: ^9.0.0
  carousel_slider: ^5.0.0
  cupertino_icons: ^1.0.8
  device_preview: ^1.2.0
  dio: ^5.5.0+1
  easy_localization: ^3.0.7+1
  equatable: ^2.0.7
  firebase_analytics: ^11.4.4
  firebase_auth: ^5.5.1
  firebase_core: ^3.12.1
  firebase_crashlytics: ^4.3.4
  firebase_remote_config: ^5.4.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  flutter_flavor: ^3.1.4
  flutter_native_splash: null
  flutter_rating_bar: ^4.0.1
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.0.17
  get_it: ^8.0.3
  go_router: ^14.8.0
  google_sign_in: ^6.3.0
  intl: 0.20.2
  package_info_plus: ^8.3.0
  persistent_bottom_nav_bar: ^6.2.1
  shared_preferences: ^2.5.2
  smooth_page_indicator: ^1.2.0+3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter_assets:
  assets_path: assets/image/
  output_path: lib/core/utils/constants
  filename: app_assets.dart

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/profile.jpg
    - assets/app_images/
    - assets/app_icons/
    - assets/home_images/
    - assets/home_images/home_icons/
    - assets/translations/
    - assets/auth_images/
    - assets/auth_images/auth_icons/
    - assets/image/
    - assets/translations/en.json
    - assets/translations/ar.json
    - assets/images/

fonts:
  - family: ProductSans
    fonts:
      - asset: assets/fonts/ProductSans-Regular.ttf
        weight: 700
      - asset: assets/fonts/ProductSans-Light.ttf
        weight: 400
      - asset: assets/fonts/Product Sans Medium 500.ttf
        weight: 500
  - family: Nunito
    fonts:
      - asset: assets/fonts/Nunito-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Nunito-Bold.ttf
        weight: 700
