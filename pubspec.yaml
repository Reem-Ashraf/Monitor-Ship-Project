name: monitor_ship_project
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.7+1
  bloc: ^9.0.0
  flutter_bloc: ^9.0.0
  go_router: ^14.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/image/

    
  fonts:
    - family: ProductSans
      fonts:
        - asset: assets/fonts/ProductSans-Regular.ttf
          weight: 700
        - asset: assets/fonts/ProductSans-Light.ttf
          weight: 400
        - asset: assets/fonts/Product Sans Medium 500.ttf
          weight: 500

